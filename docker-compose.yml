version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: email-assistant-backend
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    restart: unless-stopped

volumes:
  ollama_data:
